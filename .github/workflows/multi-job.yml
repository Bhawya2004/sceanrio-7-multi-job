name: Multi Job practical
on:
  push:
    branch:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run test
        run: echo "Running test"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Build Application
        run: echo "Building phase"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Application
        run: echo "Deployed"